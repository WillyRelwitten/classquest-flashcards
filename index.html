// ============== THREE.JS 3D CARD SYSTEM ==============
let scene, camera, renderer;
let cardMesh, frontTexture, backTexture;
let isFlipped = false;
let isAnimating = false;
let currentFrontText = "";
let currentBackText = "";

function initThreeCard() {
  const container = document.getElementById('three-container');
  container.innerHTML = '';
  
  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(320, 220);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // Scene
  scene = new THREE.Scene();

  // Camera
  camera = new THREE.PerspectiveCamera(50, 320 / 220, 0.1, 1000);
  camera.position.z = 5;

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(0, 5, 5);
  scene.add(directionalLight);

  // Card geometry
  const geometry = new THREE.PlaneGeometry(4.5, 2.8);

  // Create canvas textures
  frontTexture = createTextTexture("Question", "#166534", "#fefce8");
  backTexture = createTextTexture("Answer", "#854d0e", "#fefce8");

  const frontMaterial = new THREE.MeshPhongMaterial({ map: frontTexture, shininess: 40, color: 0xffffff });
  const backMaterial = new THREE.MeshPhongMaterial({ map: backTexture, shininess: 40, color: 0xfefce8 });

  const frontPlane = new THREE.Mesh(geometry, frontMaterial);
  frontPlane.position.z = 0.01;
  
  const backPlane = new THREE.Mesh(geometry, backMaterial);
  backPlane.position.z = -0.01;
  backPlane.rotation.y = Math.PI;

  cardMesh = new THREE.Group();
  cardMesh.add(frontPlane);
  cardMesh.add(backPlane);
  
  const borderGeometry = new THREE.PlaneGeometry(4.7, 2.95);
  const borderMaterial = new THREE.MeshPhongMaterial({ color: 0xf59e0b, shininess: 30 });
  const border = new THREE.Mesh(borderGeometry, borderMaterial);
  border.position.z = -0.02;
  cardMesh.add(border);

  scene.add(cardMesh);

  // Click handler
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  container.addEventListener('click', (event) => {
    if (isAnimating) return;
    
    const rect = container.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(cardMesh, true);
    
    if (intersects.length > 0) {
      flipCard3D();
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();
}

function createTextTexture(text, bgColor, textColor) {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 320;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#854d0e';
  ctx.lineWidth = 12;
  ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

  ctx.fillStyle = textColor;
  ctx.font = 'bold 42px Comic Neue, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const words = text.split(' ');
  let lines = [];
  let currentLine = words[0];

  for (let i = 1; i < words.length; i++) {
    const testLine = currentLine + ' ' + words[i];
    const metrics = ctx.measureText(testLine);
    if (metrics.width > 420) {
      lines.push(currentLine);
      currentLine = words[i];
    } else {
      currentLine = testLine;
    }
  }
  lines.push(currentLine);

  const lineHeight = 52;
  const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);

  lines.forEach((line, i) => {
    ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
  });

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function updateThreeCard(frontText, backText) {
  currentFrontText = frontText;
  currentBackText = backText;

  if (cardMesh) {
    const frontPlane = cardMesh.children[0];
    const backPlane = cardMesh.children[1];

    frontPlane.material.map = createTextTexture(frontText, "#166534", "#fefce8");
    backPlane.material.map = createTextTexture(backText, "#854d0e", "#fefce8");

    frontPlane.material.needsUpdate = true;
    backPlane.material.needsUpdate = true;
  }
}

function flipCard3D() {
  if (!cardMesh || isAnimating) return;
  isAnimating = true;

  const startRotation = cardMesh.rotation.y;
  const targetRotation = isFlipped ? 0 : Math.PI;
  const duration = 600;
  const startTime = Date.now();

  function animateFlip() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    
    cardMesh.rotation.y = startRotation + (targetRotation - startRotation) * eased;

    if (progress < 1) {
      requestAnimationFrame(animateFlip);
    } else {
      isFlipped = !isFlipped;
      isAnimating = false;
    }
  }

  animateFlip();
}

// ============== GAME LOGIC ==============
let currentGrade = 3;
let cards = [];
let idx = 0;
let score = 0;

function createGradeButtons() {
  const container = document.getElementById("grade-buttons");
  container.innerHTML = "";
  for (let i = 1; i <= 12; i++) {
    const btn = document.createElement("button");
    btn.className = `py-6 text-4xl font-bold rounded-3xl shadow-md active:scale-95 transition-all ${i % 2 === 0 ? 'bg-orange-500' : 'bg-sky-500'} text-white`;
    btn.textContent = i;
    btn.onclick = () => startStudy(i);
    container.appendChild(btn);
  }
}

function startStudy(g) {
  currentGrade = g;
  cards = allDecks[g] || allDecks[3];
  idx = 0;
  score = 0;
  document.getElementById("screen-grade").classList.add("hidden");
  document.getElementById("screen-study").classList.remove("hidden");
  document.getElementById("grade-num").textContent = g;
  
  setTimeout(() => {
    initThreeCard();
    loadCurrentCard();
  }, 50);
}

function loadCurrentCard() {
  const c = cards[idx];
  document.getElementById("card-num-top").textContent = idx + 1;
  document.getElementById("live-score").textContent = Math.round((score / (cards.length * 10)) * 100) + "%";
  
  updateThreeCard(c.q, c.a);

  if (cardMesh) {
    cardMesh.rotation.y = 0;
    isFlipped = false;
  }

  const container = document.getElementById("choices");
  container.innerHTML = "";
  c.opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice-btn py-5 px-4 bg-gradient-to-br from-amber-100 to-white border-4 border-yellow-400 hover:from-yellow-200 hover:to-amber-100 text-slate-900 text-xl font-bold rounded-3xl shadow-md active:scale-95";
    btn.textContent = opt;
    btn.onclick = () => {
      if (opt === c.a) score += 10;
      else alert("💡 Correct was: " + c.a);
      nextCard();
    };
    container.appendChild(btn);
  });
}

function markCorrect() { 
  score += 10; 
  alert("⭐ Great job!"); 
  nextCard(); 
}

function nextCard() {
  idx++;
  if (idx >= cards.length) {
    showResults();
  } else {
    loadCurrentCard();
  }
}

function showResults() {
  document.getElementById("screen-study").classList.add("hidden");
  const res = document.getElementById("screen-results");
  res.classList.remove("hidden");
  const percent = Math.round((score / (cards.length * 10)) * 100);
  document.getElementById("final-percent").textContent = percent + "%";
  document.getElementById("result-message").textContent = percent === 100 ? "🌟 PERFECT SCORE! GENIUS! 🌟" : "You did great! Keep studying!";
  if (percent === 100) setTimeout(launchBigCelebration, 400);
}

function launchBigCelebration() {
  confetti({particleCount: 300, spread: 100, origin: { y: 0.6 }});
  confetti({particleCount: 150, angle: 60, spread: 70, origin: { x: 0.1 }});
  confetti({particleCount: 150, angle: 120, spread: 70, origin: { x: 0.9 }});
}

function surpriseMe() { 
  const r = Math.floor(Math.random() * 12) + 1; 
  startStudy(r); 
}

function restart() { location.reload(); }
function playAgain() { startStudy(currentGrade); }
function goHome() { location.reload(); }

// INIT
createGradeButtons();
document.getElementById("screen-grade").classList.remove("hidden");
</script>
